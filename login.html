<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sisteam Café - Acceso</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" style="margin-top: 10%; max-width: 400px;">
        <h1>☕ Sisteam Café</h1>
        <h2 style="margin-bottom: 20px;">Acceso al Sistema</h2>
        <form id="formLogin">
            <div class="form-group" style="margin-bottom: 15px;">
                <label>Usuario:</label>
                <input type="text" id="user" placeholder="Ej. administrador" required>
            </div>
            <div class="form-group" style="margin-bottom: 20px;">
                <label>Contraseña:</label>
                <input type="password" id="pass" placeholder="••••••••" required>
            </div>
            <button type="submit">Ingresar al Almacén</button>
        </form>
    </div>

    <script>
        document.getElementById('formLogin').addEventListener('submit', (e) => {
            e.preventDefault();
            const user = document.getElementById('user').value;
            const pass = document.getElementById('pass').value;

            // Validación local simple para la demostración académica
            if (user === "admin" && pass === "1234") {
            alert("🎉 Acceso concedido. ¡Bienvenido!");
            window.location.href = "Secciones/index.html"; 
            } else {
                alert("❌ Usuario o contraseña incorrectos.");
            }
        });
    </script>
</body>
</html>
