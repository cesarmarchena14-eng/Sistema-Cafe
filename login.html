<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sisteam Café - Acceso</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" style="margin-top: 8%; max-width: 400px;">
        <h1>☕ Sisteam Café</h1>
        
        <div id="containerLogin">
            <h2 style="margin-bottom: 20px;">Acceso al Sistema</h2>
            <form id="formLogin">
                <div class="form-group" style="margin-bottom: 15px;">
                    <label>Usuario:</label>
                    <input type="text" id="user" placeholder="Ej. administrador" required>
                </div>
                <div class="form-group" style="margin-bottom: 20px;">
                    <label>Contraseña:</label>
                    <input type="password" id="pass" placeholder="••••••••" required>
                </div>
                <button type="submit">Ingresar al Almacén</button>
            </form>
            <div class="toggle-form">
                ¿No tienes cuenta? <a onclick="cambiarFormulario('registro')">Regístrate aquí</a>
            </div>
        </div>

        <div id="containerRegistro" class="hidden">
            <h2 style="margin-bottom: 20px;">Crear Nuevo Usuario</h2>
            <form id="formRegistro">
                <div class="form-group" style="margin-bottom: 15px;">
                    <label>Nombre de Usuario:</label>
                    <input type="text" id="regUser" placeholder="Ej. miguel_mendoza" required>
                </div>
                <div class="form-group" style="margin-bottom: 15px;">
                    <label>Contraseña:</label>
                    <input type="password" id="regPass" placeholder="Mínimo 4 caracteres" required>
                </div>
                <div class="form-group" style="margin-bottom: 20px;">
                    <label>Confirmar Contraseña:</label>
                    <input type="password" id="regPassConfirm" placeholder="Repita la contraseña" required>
                </div>
                <button type="submit" style="background-color: #4a3128;">Registrar Usuario</button>
            </form>
            <div class="toggle-form">
                ¿Ya tienes una cuenta? <a onclick="cambiarFormulario('login')">Inicia sesión</a>
            </div>
        </div>
    </div>

    <script>
        // 🔄 Función para alternar visiblemente entre Login y Registro
        function cambiarFormulario(tipo) {
            const loginSection = document.getElementById('containerLogin');
            const registroSection = document.getElementById('containerRegistro');
            
            if (tipo === 'registro') {
                loginSection.classList.add('hidden');
                registroSection.classList.remove('hidden');
                document.getElementById('formRegistro').reset();
            } else {
                registroSection.classList.add('hidden');
                loginSection.classList.remove('hidden');
                document.getElementById('formLogin').reset();
            }
        }

        // 💾 Inicializar Administrador Maestro por defecto en LocalStorage
        function inicializarUsuarios() {
            let usuarios = JSON.parse(localStorage.getItem('usuarios_sistema')) || [];
            
            // Si la memoria está vacía, registramos al admin clásico por defecto
            if (usuarios.length === 0) {
                usuarios.push({ user: "admin", pass: "1234" });
                localStorage.setItem('usuarios_sistema', JSON.stringify(usuarios));
            }
        }

        // 📝 Procesar el registro de un nuevo usuario
        document.getElementById('formRegistro').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const nuevoUser = document.getElementById('regUser').value.trim();
            const nuevoPass = document.getElementById('regPass').value;
            const passConfirm = document.getElementById('regPassConfirm').value;

            // Validaciones básicas de seguridad académica
            if (nuevoPass.length < 4) {
                alert("⚠️ La contraseña debe tener al menos 4 caracteres.");
                return;
            }

            if (nuevoPass !== passConfirm) {
                alert("❌ Las contraseñas ingresadas no coinciden.");
                return;
            }

            let usuarios = JSON.parse(localStorage.getItem('usuarios_sistema')) || [];

            // Verificar si el nombre de usuario ya está tomado
            const existe = usuarios.some(u => u.user.toLowerCase() === nuevoUser.toLowerCase());
            if (existe) {
                alert("❌ Lo sentimos, ese nombre de usuario ya está registrado.");
                return;
            }

            // Guardar el nuevo usuario en el arreglo del LocalStorage
            usuarios.push({ user: nuevoUser, pass: nuevoPass });
            localStorage.setItem('usuarios_sistema', JSON.stringify(usuarios));

            alert("🎉 ¡Usuario creado con éxito! Ahora puedes iniciar sesión.");
            cambiarFormulario('login'); // Regresa al login automáticamente
        });

        // 🔑 Procesar el inicio de sesión contrastando con LocalStorage
        document.getElementById('formLogin').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const usuarioIngresado = document.getElementById('user').value.trim();
            const passwordIngresada = document.getElementById('pass').value;

            let usuarios = JSON.parse(localStorage.getItem('usuarios_sistema')) || [];

            // Buscar si existe un objeto con las credenciales exactas
            const usuarioValido = usuarios.find(u => u.user === usuarioIngresado && u.pass === passwordIngresada);

            if (usuarioValido) {
                alert("🎉 Acceso concedido. ¡Bienvenido al almacén!");
                window.location.href = "Secciones/index.html"; // Redirección relativa directa a tus módulos
            } else {
                alert("❌ Usuario o contraseña incorrectos. Intente de nuevo.");
            }
        });

        // Ejecutar configuración inicial al cargar la página
        window.onload = inicializarUsuarios;
    </script>
</body>
</html>
